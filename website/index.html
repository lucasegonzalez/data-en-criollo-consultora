<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data en Criollo — Consultoría</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: #F0EEF7; color: #1B2A4A; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 4rem 2rem; text-align: center; }
        h1 { font-size: 3rem; font-weight: 900; margin-bottom: 0.5rem; }
        h1 span { color: #C0392B; font-style: italic; font-weight: 400; }
        .divider { width: 60px; height: 3px; background: #C0392B; margin: 2rem auto; }
        p { font-size: 1.2rem; color: #2E4170; margin-bottom: 2rem; }
        .services { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin: 3rem 0; }
        .service { background: #E4E2EF; padding: 2rem; border-radius: 8px; }
        .service h3 { color: #C0392B; margin-bottom: 0.5rem; }
        .footer { margin-top: 4rem; color: #64748B; font-size: 0.9rem; }
        @media (max-width: 600px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>DATA <span>en Criollo</span></h1>
        <div class="divider"></div>
        <p>Consultoría en análisis de datos para emprendedores latinoamericanos</p>
        
        <div class="services">
            <div class="service">
                <h3>📊 Análisis de Datos</h3>
                <p>Transformá tus datos en decisiones</p>
            </div>
            <div class="service">
                <h3>🤖 Automatización</h3>
                <p>Dejá que los procesos corran solos</p>
            </div>
            <div class="service">
                <h3>📈 Dashboards</h3>
                <p>Visualizá lo que importa</p>
            </div>
        </div>

        <p>
            <a href="mailto:consulta@dataencriollo.com" style="background:#C0392B;color:#fff;padding:1rem 2rem;text-decoration:none;border-radius:4px;display:inline-block;">
                Contactame
            </a>
        </p>

        <div class="footer">
            © 2026 Data en Criollo — Datos que transforman
        </div>
    </div>
</body>
</html>
